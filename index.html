<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#eef1f4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="My Home" />
  <title>My Home Clone — 3D間取り・日射シミュレーター</title>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/app-icon-512.png" />
  <link rel="apple-touch-icon" href="icons/app-icon-512.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />

  <!-- Three.js を CDN + importmap で読み込む（npm不要） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- ===== プラン一覧 ===== -->
  <div id="plan-list-screen">
    <header class="plan-list-header">
      <div class="plan-list-brand" id="plan-list-brand">
        <span class="logo">🏠</span>
        <span class="title">My Home Clone</span>
      </div>
    </header>
    <main class="plan-list-main">
      <div class="plan-list-title-row">
        <h1>マイプラン一覧</h1>
        <button id="plan-list-new" class="btn btn-primary" type="button">+ プラン新規作成</button>
      </div>
      <div class="plan-list-toolbar">
        <span id="plan-list-count" class="plan-list-count">全 0 件</span>
        <div class="plan-list-toolbar-right">
          <label class="plan-list-search-wrap">
            <span class="plan-list-search-icon" aria-hidden="true">🔍</span>
            <input id="plan-list-search" type="search" placeholder="プラン名で検索" autocomplete="off" />
          </label>
          <select id="plan-list-sort" class="plan-list-sort" title="並び替え">
            <option value="order-manual" selected>並び順（ドラッグ）</option>
            <option value="updated-desc">更新日（新しい順）</option>
            <option value="updated-asc">更新日（古い順）</option>
            <option value="name-asc">名前（昇順）</option>
            <option value="name-desc">名前（降順）</option>
          </select>
        </div>
      </div>
      <div id="plan-list-grid" class="plan-list-grid"></div>
    </main>
  </div>

  <!-- ===== 編集画面 ===== -->
  <div id="editor-screen" hidden>
  <!-- ===== 上部バー ===== -->
  <header id="topbar">
    <div class="topbar-main">
    <button id="back-to-list" class="btn" type="button" title="プラン一覧に戻る">← プラン一覧</button>
    <div class="brand">
      <span class="logo">🏠</span>
      <span id="editor-plan-name" class="title editor-plan-name"></span>
    </div>

    <!-- 2D / 3D 切替 -->
    <div class="seg" id="view-toggle" role="group" aria-label="ビュー切替">
      <button data-view="2d" class="seg-btn active">2D</button>
      <button data-view="3d" class="seg-btn">3D</button>
    </div>

    <!-- フロア切替 -->
    <div class="seg" id="floor-tabs" role="group" aria-label="フロア切替">
      <button data-floor="1F" class="seg-btn active">1F</button>
      <button data-floor="2F" class="seg-btn">2F</button>
      <button data-floor="3F" class="seg-btn">3F</button>
    </div>

    <button id="view3d-all-floors" class="btn" type="button" hidden title="全フロアを積み上げて表示">全階表示</button>
    <button id="zoom-fit" class="btn btn-compact" type="button" title="全体表示にズーム">全体</button>

    <div class="spacer"></div>

    <!-- JSON入出力 -->
    <div class="io-bar">
      <button id="json-export" class="btn">JSON書出</button>
      <button id="json-import" class="btn">JSON読込</button>
      <input id="json-file" type="file" accept="application/json,.json" hidden />
    </div>
    </div>

    <!-- 表示設定（2D 作図向け） -->
    <div class="topbar-display" id="display-bar">
      <span class="display-bar-label">表示</span>
      <div class="seg seg-compact" id="snap-group" role="group" aria-label="スナップ">
        <button data-snap="2" class="seg-btn" type="button">0.5P</button>
        <button data-snap="4" class="seg-btn active" type="button">0.25P</button>
      </div>
      <label class="display-toggle" title="グリッドを表示">
        <input type="checkbox" id="grid-toggle" checked />
        <span>グリッド</span>
      </label>
      <label class="display-toggle" title="寸法線を表示">
        <input type="checkbox" id="dim-toggle" />
        <span>寸法線</span>
      </label>
      <label class="display-toggle" id="lower-floor-ref-row" title="下階の間取りを薄く表示">
        <input type="checkbox" id="lower-floor-ref-toggle" checked />
        <span>下階</span>
      </label>

      <div class="display-dropdown" id="bg-menu-wrap">
        <button id="bg-menu-btn" class="btn btn-compact display-dropdown-btn" type="button" aria-expanded="false">下絵 ▾</button>
        <div id="bg-menu" class="display-dropdown-panel" hidden>
          <button id="bg-load" class="btn wide" type="button">下絵を読込</button>
          <input id="bg-file" type="file" accept="image/*" hidden />
          <button id="bg-recalib" class="btn wide" type="button" hidden>基準線を再設定</button>
          <button id="bg-position" class="btn wide" type="button" hidden>位置を調整</button>
          <button id="bg-delete" class="btn danger wide" type="button" hidden>下絵を削除</button>
          <label class="row check">
            <input type="checkbox" id="bg-visible" checked />
            <span>下絵を表示</span>
          </label>
          <div class="row">
            <span class="lbl">透過率</span>
            <input type="range" id="bg-opacity" min="0" max="100" value="50" />
            <span id="bg-opacity-label" class="lbl-val">50%</span>
          </div>
          <p id="bg-status" class="pane-hint">JPEG/PNG を読み込んで実寸合わせ</p>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== 本体 ===== -->
  <main id="layout">
    <!-- 左: コントロールパネル -->
    <aside id="panel">
      <!-- ツール -->
      <section class="pane pane-fold" id="tool-pane" data-fold-id="tool">
        <button type="button" class="pane-fold-head" aria-expanded="true">
          <span>ツール</span>
          <span class="pane-fold-icon" aria-hidden="true"></span>
        </button>
        <div class="pane-fold-body">
          <div class="seg vertical" id="tool-group">
            <button data-tool="select" class="seg-btn active" type="button">選択 / 移動</button>
            <button data-tool="pan" class="seg-btn" type="button">画面操作</button>
          </div>
        </div>
      </section>

      <!-- 部屋種別 -->
      <section class="pane pane-fold" id="room-pane" data-fold-id="room">
        <button type="button" class="pane-fold-head" aria-expanded="true">
          <span>部屋種別</span>
          <span class="pane-fold-icon" aria-hidden="true"></span>
        </button>
        <div class="pane-fold-body">
          <div class="chip-grid" id="room-types"></div>
        </div>
      </section>

      <!-- 階段 -->
      <section class="pane pane-fold" id="stair-pane" data-fold-id="stair">
        <button type="button" class="pane-fold-head" aria-expanded="true">
          <span>階段</span>
          <span class="pane-fold-icon" aria-hidden="true"></span>
        </button>
        <div class="pane-fold-body">
          <div class="chip-grid" id="stair-types"></div>
        </div>
      </section>

      <!-- 建具 -->
      <section class="pane pane-fold" id="opening-pane" data-fold-id="opening">
        <button type="button" class="pane-fold-head" aria-expanded="true">
          <span>建具</span>
          <span class="pane-fold-icon" aria-hidden="true"></span>
        </button>
        <div class="pane-fold-body">
          <div class="chip-grid" id="opening-types"></div>
          <p class="pane-hint">壁をクリックして配置。選択後ドラッグで移動。</p>
        </div>
      </section>

      <!-- 住設 -->
      <section class="pane pane-fold collapsed" id="plumbing-pane" data-fold-id="plumbing">
        <button type="button" class="pane-fold-head" aria-expanded="false">
          <span>住設</span>
          <span class="pane-fold-icon" aria-hidden="true"></span>
        </button>
        <div class="pane-fold-body">
          <div class="chip-grid" id="plumbing-types"></div>
          <p class="pane-hint">配置機能は今後追加予定</p>
        </div>
      </section>

      <!-- 家具・車 -->
      <section class="pane pane-fold" id="furniture-pane" data-fold-id="furniture">
        <button type="button" class="pane-fold-head" aria-expanded="true">
          <span>家具・車</span>
          <span class="pane-fold-icon" aria-hidden="true"></span>
        </button>
        <div class="pane-fold-body">
          <div class="chip-grid" id="furniture-types"></div>
        </div>
      </section>

      <!-- 外構 -->
      <section class="pane pane-fold collapsed" id="exterior-pane" data-fold-id="exterior">
        <button type="button" class="pane-fold-head" aria-expanded="false">
          <span>外構</span>
          <span class="pane-fold-icon" aria-hidden="true"></span>
        </button>
        <div class="pane-fold-body">
          <div class="chip-grid" id="exterior-types"></div>
          <p class="pane-hint">配置機能は今後追加予定</p>
        </div>
      </section>

      <!-- 選択中プロパティ -->
      <section class="pane" id="props-pane">
        <h3>プロパティ</h3>
        <div id="props-body" class="props-empty">未選択</div>
      </section>

    </aside>

    <!-- 右: 作図 / 3D -->
    <section id="stage">
      <canvas id="canvas2d"></canvas>
      <div id="viewer3d" hidden></div>
      <div id="hint"></div>

      <!-- フロア情報（2D・右上・クリックで開閉） -->
      <div id="floor-info-panel" class="stage-float-panel">
        <button id="floor-info-toggle" class="stage-float-btn" type="button" aria-expanded="false" aria-controls="floor-info-popover">
          フロア情報
        </button>
        <div id="floor-info-popover" class="stage-float-popover" hidden>
          <h4 class="stage-float-title">このフロアの情報</h4>
          <div id="floor-info" class="info"></div>
        </div>
      </div>

      <!-- 日射シミュレーション パネル（3D表示中のみ） -->
      <div id="sun-panel" hidden>
        <div class="sun-head">
          <span class="sun-title">☀ 日射シミュレーション</span>
          <button id="sun-play" class="btn sun-play" title="1日の動きを再生">▶ 再生</button>
        </div>

        <div class="sun-row">
          <label>日付 <b id="sun-date-label">6/21</b></label>
          <input type="range" id="sun-date" min="1" max="365" value="172" />
          <datalist id="sun-date-ticks"></datalist>
        </div>
        <div class="sun-seasons" id="sun-seasons"></div>

        <div class="sun-row">
          <label>時刻 <b id="sun-hour-label">12:00</b></label>
          <input type="range" id="sun-hour" min="0" max="23" value="12" />
        </div>

        <div class="sun-info" id="sun-info">方位 — / 高度 —</div>

        <div class="sun-row sun-geo">
          <label>方位角(°)</label>
          <input type="number" id="sun-azimuth" min="0" max="359" step="1" value="0" />
          <label>緯度</label>
          <input type="number" id="sun-lat" step="0.001" />
          <label>経度</label>
          <input type="number" id="sun-lng" step="0.001" />
        </div>
      </div>
    </section>
  </main>
  </div><!-- /#editor-screen -->

  <!-- 敷地写真：実寸入力 -->
  <div id="bg-scale-modal" class="modal" hidden>
    <div class="modal-box">
      <h4>実寸を入力</h4>
      <p id="bg-scale-px-info" class="pane-hint"></p>
      <label class="modal-field">
        <span>2点間の実距離 (mm)</span>
        <input type="number" id="bg-scale-mm" min="1" step="1" placeholder="例: 9100" />
      </label>
      <div class="btn-row">
        <button id="bg-scale-cancel" class="btn" type="button">キャンセル</button>
        <button id="bg-scale-ok" class="btn" type="button">OK</button>
      </div>
    </div>
  </div>

  <!-- 敷地写真：位置調整 -->
  <div id="bg-pos-modal" class="modal" hidden>
    <div class="modal-box">
      <h4>位置調整</h4>
      <p class="pane-hint">矢印で mm 単位に移動。Canvas 上で位置を確認してください。</p>
      <div class="bg-pos-pad">
        <button type="button" class="btn bg-pos-btn" data-dx="0" data-dz="-100">↑</button>
        <div class="bg-pos-row">
          <button type="button" class="btn bg-pos-btn" data-dx="-100" data-dz="0">←</button>
          <button type="button" class="btn bg-pos-btn" data-dx="100" data-dz="0">→</button>
        </div>
        <button type="button" class="btn bg-pos-btn" data-dx="0" data-dz="100">↓</button>
      </div>
      <p id="bg-pos-offset" class="pane-hint">X: 0 / Z: 0 mm</p>
      <button id="bg-pos-ok" class="btn wide" type="button">OK</button>
    </div>
  </div>

  <!-- 共通ダイアログ（PWA standalone 向け） -->
  <div id="app-prompt-modal" class="modal" hidden>
    <div class="modal-box">
      <h4 id="app-prompt-title"></h4>
      <label class="modal-field">
        <span id="app-prompt-label"></span>
        <input type="text" id="app-prompt-input" autocomplete="off" />
      </label>
      <div class="btn-row">
        <button id="app-prompt-cancel" class="btn" type="button">キャンセル</button>
        <button id="app-prompt-ok" class="btn btn-primary" type="button">OK</button>
      </div>
    </div>
  </div>

  <div id="app-confirm-modal" class="modal" hidden>
    <div class="modal-box">
      <h4 id="app-confirm-title">確認</h4>
      <p id="app-confirm-message" class="modal-message"></p>
      <div class="btn-row">
        <button id="app-confirm-cancel" class="btn" type="button">キャンセル</button>
        <button id="app-confirm-ok" class="btn" type="button">OK</button>
      </div>
    </div>
  </div>

  <div id="app-alert-modal" class="modal" hidden>
    <div class="modal-box">
      <h4 id="app-alert-title"></h4>
      <p id="app-alert-message" class="modal-message"></p>
      <button id="app-alert-ok" class="btn wide btn-primary" type="button">OK</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
